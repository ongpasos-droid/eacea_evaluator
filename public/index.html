<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EACEA Evaluator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <span>Cargando proyecto...</span>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="toolbar-title">
          <div class="question-title" id="questionTitle">EACEA Evaluator</div>
          <div class="question-subtitle" id="questionSubtitle"></div>
        </div>
        <div class="toolbar-actions">
          <button class="btn btn-secondary" id="btnSave" onclick="saveCurrentProject()">Guardar</button>
          <button class="btn btn-primary" id="btnExport" onclick="window.location='/api/project/export/json'">Exportar JSON</button>
        </div>
      </div>
    </div>

    <!-- Intake card (module 0) -->
    <div class="intake-card" id="intakeCard" style="display:none">
      <div class="card-header">
        <h2>Información del proyecto</h2>
        <div class="form-chip" id="currentFormChip"></div>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label for="projectName">Nombre del proyecto</label>
          <input type="text" id="projectName" class="form-control" placeholder="Nombre del proyecto...">
        </div>
        <div class="form-group">
          <label for="projectType">Tipo de proyecto</label>
          <select id="projectType" class="form-control">
            <option value="">Selecciona tipo...</option>
            <option value="KA3">KA3 - Policy Support</option>
            <option value="KA2">KA2 - Strategic Partnerships</option>
            <option value="KA1">KA1 - Learning Mobility</option>
          </select>
        </div>
        <div class="form-group">
          <label for="projectVersion">Versión de trabajo</label>
          <input type="text" id="projectVersion" class="form-control" placeholder="Ej: Draft v1, Pre-submit...">
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">
        <h3 style="font-size:14px;font-weight:600;margin-bottom:8px;">Versiones guardadas</h3>
        <div id="savedVersionsContainer"></div>
        <button class="btn btn-secondary" id="downloadJsonBtn" style="margin-top:12px;">Guardar versión</button>
      </div>
    </div>

    <!-- Question config shell (modules 1+) -->
    <div class="question-config-shell" id="questionConfigShell" style="display:none">

      <!-- Question general config -->
      <div class="question-config-card">
        <div class="card-header">
          <h2 id="questionConfigTitle">Configuración de pregunta</h2>
        </div>
        <div class="config-grid">
          <div class="form-group">
            <label for="questionCode">Código</label>
            <input type="text" id="questionCode" class="form-control" placeholder="1.1">
          </div>
          <div class="form-group">
            <label for="questionMaxScore">Puntuación máx.</label>
            <input type="number" id="questionMaxScore" class="form-control" min="0" step="1">
          </div>
          <div class="form-group">
            <label for="questionName">Título</label>
            <input type="text" id="questionName" class="form-control" placeholder="Título de la pregunta...">
          </div>
          <div class="form-group">
            <label for="questionThreshold">Umbral mínimo</label>
            <input type="number" id="questionThreshold" class="form-control" min="0" step="1">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label for="questionPrompt">Instrucción / Prompt</label>
            <textarea id="questionPrompt" class="form-control" rows="3" placeholder="Instrucción para el evaluador..."></textarea>
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label for="scoreCaps">Limitaciones de puntuación (una por línea)</label>
            <textarea id="scoreCaps" class="form-control" rows="2" placeholder="Ej: Puntuación máxima 10. Por debajo de 6, no pasa..."></textarea>
          </div>
        </div>
        <div class="rules-list">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <h3 style="font-size:13px;font-weight:600;">Reglas generales</h3>
          </div>
          <div id="generalRulesContainer"></div>
        </div>
      </div>

      <!-- Criteria shell -->
      <div class="criteria-shell">
        <div class="section-header">
          <h3>Criterios de evaluación</h3>
        </div>
        <div id="miniPointsContainer" style="padding:0 0 8px;"></div>
      </div>

    </div>

  </main>

  <!-- INSPECTOR: Scoring + Versions -->
  <aside class="inspector">
    <div class="inspector-header">
      <h3>Puntuación</h3>
      <div id="totalPercent" style="font-size:13px;color:var(--active-color);font-weight:700;">-</div>
    </div>
    <div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);">
      Total: <strong id="totalScore">- / -</strong>
    </div>
    <div id="scoringPanel" style="overflow-y:auto;flex:1;padding:8px 0;"></div>
  </aside>

</div>

<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui/sidebar.js"></script>
<script src="js/ui/intake.js"></script>
<script src="js/ui/question-config.js"></script>
<script src="js/ui/criteria.js"></script>
<script src="js/ui/scoring.js"></script>
<script src="js/ui/versions.js"></script>
<script src="js/app.js"></script>
</body>
</html>
